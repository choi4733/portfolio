<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/setting/reset.css" />
    <link rel="stylesheet" href="assets/css/setting/font.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />

    <title>희경's portfolio</title>
  </head>
  <body>
    <section class="intro">
      <video id="introVideo" muted autoplay playsinline preload="auto">
        <source src="assets/media/intro.mp4" type="video/mp4" />
      </video>
    </section>
    <!-- intro -->

    <header id="header">
      <nav id="nav">
        <ul>
          <li><a href="#illustrator">Illustrator</a></li>
          <li><a href="#photoshop">Photoshop</a></li>
          <li><a href="#premiere">Premiere Pro</a></li>
          <li><a href="#aftereffects">After Effects</a></li>
          <li><a href="#web">Web</a></li>
          <li><a href="#about">About</a></li>
        </ul>
      </nav>
      <!-- nav -->
    </header>
    <!-- header -->

    <section class="artwork" id="illustrator">
      <div class="art_inner">
        <img src="assets/img/artwork.svg" alt="일러스트레이터 아트웍1" />
        <div class="art_text">
          <div class="art_title">Illustrator</div>
          <div class="art_desc">Art Work</div>
        </div>
      </div>
    </section>
    <!-- Illustrator Artwork -->

    <section class="banner" id="photoshop">
      <div class="banner_text">
        <div class="banner_title">Photoshop</div>
        <div class="banner_desc">Banner</div>
      </div>
      <div class="banner_inner">
        <div class="banner_l">
          <img src="assets/img/eventpage.jpg" alt="이벤트페이지썸네일" class="event_thumb" />

          <div class="event_preview">
            <img src="assets/img/eventpage.jpg" alt="이벤트페이지 프리뷰" />
          </div>
        </div>

        <div class="banner_r">
          <img src="assets/img/sunsurollBanner.jpg" alt="성심당 순수롤 배너" />
          <img src="assets/img/madeleineBanner.jpg" alt="성심당 순수마들렌 배너" />
          <img src="assets/img/goldBanner.jpg" alt="성심당 골드바 배너" />
          <img src="assets/img/yaggwaBanner.jpg" alt="성심당 브루스약과 배너" />
          <img src="assets/img/jeonbyeongBanner.jpg" alt="성심당 브루스전병 배너" />
        </div>
      </div>

      <!-- 이벤트페이지 전체보기 -->
      <div class="event_modal">
        <button class="event_close">x</button>

        <div class="event_modal_inner">
          <img src="assets/img/eventpage.jpg" alt="이벤트페이지 전체" />
        </div>
      </div>
    </section>
    <!-- Photoshop Banner -->

    <section class="premiere" id="premiere">
      <div class="premiere_text">
        <div class="premiere_title">Premiere Pro</div>
        <div class="premiere_desc">Media</div>
      </div>
      <video src="assets/media/kingsman.mp4"></video>
      <video src="assets/media/"></video>
    </section>
    <!-- Premiere Pro -->

    <section class="after" id="aftereffects">
      <div class="after_text">
        <div class="after_title">After Effects</div>
        <div class="after_desc">Motion Video</div>
      </div>
      <div class="after_mask">
        <div class="swiper afterSwiper">
          <div class="swiper-wrapper">
            <div class="swiper-slide">
              <video src="assets/media/kinetic.mp4" muted loop playsinline></video>
            </div>
            <div class="swiper-slide">
              <video src="assets/media/logomotion.mp4" muted loop playsinline></video>
            </div>
            <div class="swiper-slide">
              <video src="assets/media/motionIntro.mp4" muted loop playsinline></video>
            </div>
            <div class="swiper-slide">
              <video src="assets/media/tension.mp4" muted loop playsinline></video>
            </div>
            <div class="swiper-slide">
              <video src="assets/media/epikHigh.mp4" muted loop playsinline></video>
            </div>
          </div>
          <div class="swiper-button-prev"></div>
          <div class="swiper-button-next"></div>
        </div>
      </div>
    </section>
    <!-- After Effects -->

    <div class="cursor">
      <div class="circle circle1">
        <span>SEE</span>
      </div>
      <div class="circle circle2"></div>
      <div class="circle circle3"></div>
    </div>
    <!-- cursor -->

    <!-- script -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
    <script src="assets/js/style.js"></script>
    <script>
      // After Effects
      const afterSwiper = new Swiper(".afterSwiper", {
        slidesPerView: 3,
        centeredSlides: true,
        spaceBetween: -60,
        loop: true,
        speed: 800,

        navigation: {
          nextEl: ".afterSwiper .swiper-button-next",
          prevEl: ".afterSwiper .swiper-button-prev",
        },

        on: {
          init(swiper) {
            swiper.slides.forEach((slide) => {
              const video = slide.querySelector("video");
              video.pause();
            });

            const activeVideo = swiper.slides[swiper.activeIndex].querySelector("video");

            activeVideo.play();
          },

          slideChangeTransitionEnd(swiper) {
            swiper.slides.forEach((slide) => {
              const video = slide.querySelector("video");

              video.pause();
              video.currentTime = 0;
            });

            const activeVideo = swiper.slides[swiper.activeIndex].querySelector("video");

            activeVideo.play();
          },
        },
      });
    </script>
  </body>
</html>
