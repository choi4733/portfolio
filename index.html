<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="assets/css/setting/reset.css" />
    <link rel="stylesheet" href="assets/css/setting/font.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />

    <title>희경's portfolio</title>
  </head>
  <body>
    <section class="intro">
      <video id="introVideo" muted autoplay playsinline preload="auto">
        <source src="assets/img/intro.mp4" type="video/mp4" />
      </video>
    </section>
    <!-- intro -->

    <header id="header">
      <nav id="nav">
        <ul>
          <li><a href="#illustrator">Illustrator</a></li>
          <li><a href="#photoshop">Photoshop</a></li>
          <li><a href="#premiere">Premiere Pro</a></li>
          <li><a href="#aftereffects">After Effects</a></li>
        </ul>
      </nav>
      <!-- nav -->
    </header>
    <!-- header -->

    <section class="artwork" id="illustrator">
      <div class="art_inner">
        <img src="assets/img/artwork.svg" alt="" />
        <div class="art_text">
          <div class="art_title">Illustrator</div>
          <div class="art_desc">Art Work</div>
        </div>
      </div>
    </section>
    <!-- Illustrator Artwork -->

    <section class="banner" id="photoshop">
      <div class="banner_text">
        <div class="banner_title">Photoshop</div>
        <div class="banner_desc">Banner</div>
      </div>
      <div class="slider_mask">
        <div class="swiper bannerSwiper">
          <div class="swiper-wrapper">
            <div class="swiper-slide">
              <img src="assets/img/sunsurollBanner.jpg" alt="" />
            </div>
            <div class="swiper-slide">
              <img src="assets/img/madeleineBanner.jpg" alt="" />
            </div>
            <div class="swiper-slide">
              <img src="assets/img/goldBanner.jpg" alt="" />
            </div>
            <div class="swiper-slide">
              <img src="assets/img/yaggwaBanner.jpg" alt="" />
            </div>
            <div class="swiper-slide">
              <img src="assets/img/jeonbyeongBanner.jpg" alt="" />
            </div>
            <div class="swiper-slide">
              <img src="assets/img/sunsurollBanner.jpg" alt="" />
            </div>
            <div class="swiper-slide">
              <img src="assets/img/madeleineBanner.jpg" alt="" />
            </div>
            <div class="swiper-slide">
              <img src="assets/img/goldBanner.jpg" alt="" />
            </div>
            <div class="swiper-slide">
              <img src="assets/img/yaggwaBanner.jpg" alt="" />
            </div>
            <div class="swiper-slide">
              <img src="assets/img/jeonbyeongBanner.jpg" alt="" />
            </div>
          </div>
          <div class="swiper-button-next"></div>
          <div class="swiper-button-prev"></div>
        </div>
      </div>
    </section>
    <!-- Photoshop Banner -->

    <div class="cursor">
      <div class="circle circle1">
        <span>SEE</span>
      </div>
      <div class="circle circle2"></div>
      <div class="circle circle3"></div>
    </div>
    <!-- cursor -->

    <!-- script -->
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.1/dist/ScrollTrigger.min.js"></script>
    <script src="assets/js/style.js"></script>
    <script>
      var swiper = new Swiper(".bannerSwiper", {
        slidesPerView: 5.5,
        centeredSlides: true,
        loop: true,
        speed: 700,
        spaceBetween: -60,

        autoplay: {
          delay: 2500,
          disableOnInteraction: false,
        },

        navigation: {
          nextEl: ".swiper-button-next",
          prevEl: ".swiper-button-prev",
        },

        watchSlidesProgress: true,
      });
    </script>
  </body>
</html>
